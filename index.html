<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Passcode</title>
    <style>
        body {
            background: #000;
            color: #fff;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input[type="password"] {
            padding: 10px;
            font-size: 1rem;
            margin-top: 10px;
            border: none;
            border-radius: 4px;
            outline: none;
        }
        .error {
            color: #f55;
            margin-top: 10px;
            height: 20px;
        }
        label {
            font-size: 1.2rem;
        }
        button {
            margin-top: 12px;
            padding: 10px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            background: #ff2540;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <label for="passcode">Enter Passcode:</label>
        <input type="password" id="passcode" autocomplete="off" autofocus />
        <button id="login-btn">Log In</button>
        <div class="error" id="error"></div>
    </div>
    <script>
        const input = document.getElementById('passcode');
        const error = document.getElementById('error');
        const loginBtn = document.getElementById('login-btn');
        function tryLogin() {
            if (input.value === '1997') {
                window.location.href = 'main.html';
            } else {
                error.textContent = 'Incorrect passcode. Try again.';
                input.value = '';
            }
        }
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                tryLogin();
            }
        });
        loginBtn.addEventListener('click', tryLogin);
    </script>
</body>
</html>
