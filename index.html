<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Valentine Honey Natey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* prevent page scrolling */
        }

        body {
            font-family: 'Georgia', serif;
            background: #000; /* black page background */
            min-height: 100%;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            width: 80%; /* occupy 80% of the viewport horizontally */
            height: 100vh; /* full viewport vertically */
            margin: 0 auto; /* center horizontally */
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #ff1a1a 0%, #b30000 100%);
            color: white;
            padding: clamp(12px, 3.5vw, 28px) 20px;
            text-align: center;
            position: relative; /* not fixed */
            width: 100%;
            border-radius: 18px;
            overflow: visible;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        .header h1 {
            font-size: clamp(1.3rem, 3.6vw, 2.1rem);
            margin: 6px 0 6px 0;
        }

        .header p {
            font-size: clamp(0.95rem, 2.2vw, 1.05rem);
            opacity: 0.95;
            margin-bottom: 6px;
        }

        .slider-container {
            position: relative;
            width: 65%;
            flex: 1;
            margin: 20px auto;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            overflow: hidden;
            border-radius: 14px;
        }

        .slide {
            opacity: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            transition: opacity 1.2s ease-in-out;
            pointer-events: none;
        }

        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }


        /* Caption bar at the very top of the photo area */
        .caption {
            position: static;
            background: #fff;
            color: #111;
            padding: 12px 18px 8px 18px;
            border-radius: 18px 18px 0 0;
            font-size: 1.08rem;
            max-width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 1;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin: 0;
            width: 100%;
        }

        .caption .title {
            font-weight: 800;
            font-size: 1.13rem;
            color: #111;
            padding-left: 12px;
            letter-spacing: 0.4px;
            text-shadow: 0 3px 14px rgba(229,57,53,0.08);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .caption:empty { display: none; }

        /* gentle Ken Burns zoom on the active slide image */
        .slide img {
            transform: scale(1);
            transition: transform 7s ease-in-out;
            will-change: transform;
        }

        .slide.active img {
            transform: scale(1.04);
        }

        /* photo frame removed */

        .slide img {
            width: auto;
            height: 100%;
            object-fit: cover;
            display: block;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slider-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        button {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        button:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* Valentine-themed arrow-only slider buttons */
        .slider-controls button {
            background: linear-gradient(135deg, rgba(255,65,108,0.5) 0%, rgba(179,0,0,0.5) 100%); /* 50% transparent */
            color: #fff;
            border: none;
            width: 56px;
            height: 56px;
            padding: 0;
            border-radius: 50%;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(179,0,0,0.25);
            transform: translateY(0);
            transition: transform .18s ease, box-shadow .18s ease, filter .18s, background .18s;
            z-index: 20;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .slider-controls button svg {
            width: 22px;
            height: 22px;
            display: block;
            fill: #fff;
        }

        /* simple text arrows inside buttons */
        .slider-controls button .arrow {
            color: #fff;
            font-size: 1.6em;
            line-height: 1;
            font-weight: 700;
            transform: translateY(-1px);
        }

        .slider-controls button:hover {
            transform: translateY(-4px) scale(1.03);
            filter: brightness(1.06);
            box-shadow: 0 14px 30px rgba(179,0,0,0.35);
            background: linear-gradient(135deg, rgba(255,65,108,0.85) 0%, rgba(179,0,0,0.85) 100%);
        }

        .content {
            padding: 30px 30px;
            overflow: auto; /* internal scrolling if needed, page itself won't scroll */
            flex: 0 0 auto;
        }

        .story-section {
            margin-bottom: 30px;
        }

        .story-section h2 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .story-section p {
            color: #555;
            line-height: 1.8;
            font-size: 1.1em;
        }

        .heart {
            color: #ff0000;
            animation: heartbeat 1s infinite;
            text-shadow: 0 2px 6px rgba(0,0,0,0.2);
            font-size: 1.1em;
            margin: 0 6px;
            display: inline-block;
        }

        .header .heart { font-size: 1.4em; }

        /* Decorative flowers in the header */
        .flowers {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .flowers svg { 
            position: absolute;
            width: 110px;
            height: auto;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.25));
            opacity: 0.97;
            transform-origin: center center;
            will-change: transform;
        }

        .header > h1, .header > p { position: relative; z-index: 2; }

        /* initial positions + slow floating animations */
        .flowers svg:nth-child(1) { left: -30px; top: 8px; transform: rotate(-10deg); animation: driftDown 16s ease-in-out infinite alternate; }
        .flowers svg:nth-child(2) { right: -30px; top: 8px; transform: rotate(10deg); animation: driftDown 18s ease-in-out infinite alternate; }
        .flowers svg:nth-child(3) { left: 50%; bottom: -40px; transform: translateX(-50%); width: 120px; animation: driftDown 20s ease-in-out infinite alternate; }
        .flowers svg:nth-child(4) { left: 10%; top: -10px; width: 90px; animation: driftDown 22s ease-in-out infinite alternate; }
        .flowers svg:nth-child(5) { left: 30%; top: -20px; width: 80px; animation: driftDown 24s ease-in-out infinite alternate; }
        .flowers svg:nth-child(6) { left: 70%; top: -15px; width: 95px; animation: driftDown 19s ease-in-out infinite alternate; }
        .flowers svg:nth-child(7) { right: 10%; top: -5px; width: 100px; animation: driftDown 21s ease-in-out infinite alternate; }
        .flowers svg:nth-child(8) { left: 85%; bottom: -20px; width: 120px; animation: driftDown 25s ease-in-out infinite alternate; }

        @keyframes driftDown {
            0% { transform: translateY(0) rotate(-2deg) scale(1); opacity: 0.98; }
            100% { transform: translateY(140px) rotate(6deg) scale(1.02); opacity: 0.98; }
        }

        /* floating falling items (hearts & small flowers) */
        .floating-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: visible;
            z-index: 30;
        }

        /* full-screen background floating (left/right streams) */
        .bg-floating-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: visible;
            z-index: 8; /* behind container floating (30) but above page background */
        }

        .floating-item {
            position: absolute;
            top: -40px;
            will-change: transform, opacity;
            pointer-events: none;
            transform-origin: center;
            opacity: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) scale(1) rotate(0deg); opacity: 1; }
            80% { opacity: 0.9; }
            100% { transform: translateY(var(--fall-distance,260px)) scale(0.95) rotate(12deg); opacity: 0; }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .footer {
            background: transparent; /* make bottom transparent */
            padding: 12px 20px;
            text-align: center;
            color: #764ba2;
            font-size: 1.1em;
            flex: 0 0 auto;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.6em;
            }

            .header {
                width: 100%;
                padding: 12px 12px;
                border-radius: 12px;
            }

            .slider-container {
                /* on small screens use full width and shorter height */
                width: 96%;
                height: 40vh;
            }

            .content {
                padding: 20px 15px;
            }

            .story-section p {
                font-size: 1em;
            }
            .container {
                width: 96%;
                height: auto;
                border-radius: 14px;
            }
        }
        /* Music control button */
        .music-toggle {
            position: fixed;
            right: 18px;
            bottom: 18px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff6b8a 0%, #ff2e50 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 10px 30px rgba(179,0,0,0.25);
            cursor: pointer;
            z-index: 120;
            transition: transform .18s ease, opacity .18s ease;
        }

        .music-toggle:hover { transform: translateY(-4px) scale(1.03); }

        @media (max-width: 420px) {
            .music-toggle { width:44px; height:44px; font-size:18px; right:12px; bottom:12px; }
        }

        /* Background rotating love quotes (left & right) */
        .bg-quote {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: clamp(220px, 24vw, 360px);
            pointer-events: none;
            z-index: 6; /* behind floating hearts (8/30) but above page background */
            color: rgba(255,255,255,0.95);
            text-shadow: 0 6px 24px rgba(0,0,0,0.45);
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            line-height: 1.28;
            letter-spacing: 0.2px;
        }

        /* align to the centered container which uses 80% width (so container inset is 10%) */
        .bg-quote-left { left: 10%; text-align: left; }
        .bg-quote-right { right: 10%; text-align: right; }

        .bg-quote .quote {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: inherit;
            opacity: 0;
            transition: opacity 700ms ease, transform 700ms ease;
            transform: translateY(6px);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            color: #e53935; /* red color */
            font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 4px 18px rgba(229,57,53,0.13), 0 1px 0 #fff;
            background: none;
            padding: 18px 16px;
            border-radius: 12px;
            max-width: 100%;
            min-height: clamp(140px, 28vh, 340px);
            box-shadow: none;
            text-shadow: 0 2px 12px rgba(0,0,0,0.18);
        }

        .bg-quote .quote.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 700px) {
            .bg-quote { display: none; }
        }
    </style>
</head>

        function checkImage(url) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                // start load
                img.src = url;
            });
        }

        async function buildSlides() {
            const sliderContainer = document.querySelector('.slider-container');
            const slidesWrapper = sliderContainer.querySelector('.slides-wrapper');
            const captionBar = document.getElementById('slider-caption-bar');

            // first, try to detect sequentially named images (01..20) with common extensions
            const found = [];
            const maxIndex = 50; // will probe 01..50
            const exts = ['jpg', 'jpeg', 'png'];

            const checks = [];
            for (let i = 1; i <= maxIndex; i++) {
                const idx = String(i);
                for (const ext of exts) {
                    const path = `images/${idx}.${ext}`;
                    const p = checkImage(path).then(ok => { if (ok) found.push(path); });
                    checks.push(p);
                }
            }

            await Promise.all(checks);

            // If none found, fall back to existing inline slide images
            let imageUrls = [];
            if (found.length > 0) {
                // Sort found images numerically by filename
                imageUrls = Array.from(new Set(found)).sort((a, b) => {
                    const getNum = s => {
                        const m = s.match(/(\d+)\.[a-zA-Z]+$/);
                        return m ? parseInt(m[1], 10) : 0;
                    };
                    return getNum(a) - getNum(b);
                });
            } else {
                imageUrls = Array.from(sliderContainer.querySelectorAll('.slide img')).map(i => i.getAttribute('src'))
                    .filter(Boolean);
            }

            // clear existing slides (except controls, caption bar, and slides-wrapper)
            if (slidesWrapper) {
                slidesWrapper.innerHTML = '';
            }

            if (imageUrls.length === 0) {
                slides = [];
                currentSlide = 0;
                if (captionBar) captionBar.style.display = 'none';
                return;
            }

            // build slides from discovered images
            imageUrls.forEach((src, idx) => {
                const div = document.createElement('div');
                div.className = 'slide' + (idx === 0 ? ' active' : '');
                const img = document.createElement('img');
                img.src = src;
                img.alt = decodeURIComponent(src.split('/').pop().replace(/\+/g, ' '));
                div.appendChild(img);
                if (slidesWrapper) slidesWrapper.appendChild(div);
            });

            slides = Array.from(slidesWrapper.querySelectorAll('.slide'));
            currentSlide = 0;
            updateCaptionBar();
        }

        function showSlide(index) {
            if (!slides || slides.length === 0) return;
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
            });
            slides[index].classList.add('active');
            updateCaptionBar();
        }

        function updateCaptionBar() {
            const captionBar = document.getElementById('slider-caption-bar');
            if (!captionBar) return;
            if (!slides || slides.length === 0) {
                captionBar.style.display = 'none';
                return;
            }
            const titleText = (imageTitles && imageTitles[currentSlide]) ? imageTitles[currentSlide] : '';
            if (titleText) {
                captionBar.innerHTML = `<span class="title">${titleText}</span>`;
                captionBar.style.display = '';
            } else {
                captionBar.innerHTML = '';
                captionBar.style.display = 'none';
            }
        }

        // Auto-play controls
        let autoPlayDelay = 7000; // ms — slower, more graceful
        let autoPlayIntervalId = null;

        function startAutoPlay() {
            stopAutoPlay();
            if (!slides || slides.length === 0) return;
            autoPlayIntervalId = setInterval(() => { nextSlide(true); }, autoPlayDelay);
        }

        function stopAutoPlay() {
            if (autoPlayIntervalId) {
                clearInterval(autoPlayIntervalId);
                autoPlayIntervalId = null;
            }
        }

        function nextSlide(isAuto = false) {
            if (!slides || slides.length === 0) return;
            currentSlide = (currentSlide + 1) % slides.length;
            showSlide(currentSlide);
            if (!isAuto) startAutoPlay();
        }

        function prevSlide() {
            if (!slides || slides.length === 0) return;
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            showSlide(currentSlide);
            startAutoPlay();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await buildSlides();
            // start autoplay when slides are ready
            startAutoPlay();

            // pause on hover
            const sliderEl = document.querySelector('.slider-container');
            if (sliderEl) {
                sliderEl.addEventListener('mouseenter', () => stopAutoPlay());
                sliderEl.addEventListener('mouseleave', () => startAutoPlay());
            }
        });
    </script>

                "Thank you for believing in us, even when I doubted.",
                "You turn my fractures into mosaic pieces of beauty.",
                "With you beside me, hard days find a softer ending.",
                "Your steady love taught me how to stay."
            ];

            // short poems (a few lines each) to add variety
            const poemsLeft = [
                "You stayed when worlds unraveled\nand made our pieces glow again.",
                "When my voice was a whisper\nyou answered with patience and courage.",
                "You held my trembling hands\nand turned my fears to promises."
            ];

            const poemsRight = [
                "Through worn shoes and heavy rains\nyou were the steady map to home.",
                "The nights were long but your light\nkept time in another, kinder rhythm.",
                "We stitched the quiet hours together\nand learned how to keep each other safe."
            ];

            // merge arrays to have variety
            const leftPool = leftQuotes.concat(poemsLeft);
            const rightPool = rightQuotes.concat(poemsRight);

            let leftIndex = 0, rightIndex = 0;

            function show(el, text) {
                if(!el) return;
                // fade out
                el.classList.remove('show');
                setTimeout(() => {
                    el.innerHTML = text.replace(/\n/g, '<br>');
                    el.classList.add('show');
                }, 220);
            }

            let showLeft = true;
            function step() {
                if (showLeft) {
                    show(leftEl, leftPool[leftIndex % leftPool.length]);
                    leftEl.style.visibility = 'visible';
                    rightEl.classList.remove('show');
                    rightEl.style.visibility = 'hidden';
                    leftIndex++;
                } else {
                    show(rightEl, rightPool[rightIndex % rightPool.length]);
                    rightEl.style.visibility = 'visible';
                    leftEl.classList.remove('show');
                    leftEl.style.visibility = 'hidden';
                    rightIndex++;
                }
                showLeft = !showLeft;
            }

            // initial show after DOM ready
            document.addEventListener('DOMContentLoaded', () => {
                leftEl.style.visibility = 'visible';
                rightEl.style.visibility = 'hidden';
                step();
                setInterval(step, intervalMs);
            });
        })();
    </script>

    <script>
        (function(){
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-toggle');
            audio.volume = 0.6;
            let playing = false;

            function updateBtn(){
                btn.textContent = playing ? '⏸' : '♪';
                btn.setAttribute('aria-pressed', String(playing));
            }

            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (!playing) {
                    try { await audio.play(); playing = true; } catch (err) { playing = false; }
                } else {
                    audio.pause(); playing = false;
                }
                updateBtn();
            });

            // Attempt to play on load; user can pause/resume with the toggle button.
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    await audio.play();
                    playing = true;
                } catch (err) {
                    playing = false;
                }
                updateBtn();
            });
        })();
    </script>
    <script>
        // Floating hearts/flowers spawner
        (function(){
            const container = document.querySelector('.container');
            const floating = document.createElement('div');
            floating.className = 'floating-container';
            container.appendChild(floating);

            function createHeartHTML(size){
                return `<span class="floating-item" style="width:${size}px;height:${size}px;left:VAR_LEFT%">
                    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" aria-hidden="true">
                        <path d="M16 29s-13-8.5-13-16c0-4.5 3.5-7 7-7 2.5 0 4 1.2 6 3 2-1.8 3.5-3 6-3 3.5 0 7 2.5 7 7 0 7.5-13 16-13 16z" fill="#ff2540"/>
                    </svg>
                </span>`;
            }

            function createFlowerHTML(size){
                return `<span class="floating-item" style="width:${size}px;height:${size}px;left:VAR_LEFT%">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" aria-hidden="true">
                        <defs>
                            <path id="__ph" d="M32 46c-6-6-12-10-12-16 0-6 4-10 10-10 3.5 0 5.5 1.5 7 3 1.5-1.5 3.5-3 7-3 6 0 10 4 10 10 0 6-6 10-12 16-3 3-6 4-10 0z"/>
                        </defs>
                        <use href="#__ph" fill="#ff2e50" transform="rotate(0 32 32) scale(0.35)"/>
                        <use href="#__ph" fill="#ff4b6a" transform="rotate(45 32 32) scale(0.35)"/>
                        <use href="#__ph" fill="#ff5c8a" transform="rotate(90 32 32) scale(0.35)"/>
                        <use href="#__ph" fill="#ff2e63" transform="rotate(135 32 32) scale(0.35)"/>
                        <circle cx="32" cy="32" r="4" fill="#FFD54D"/>
                    </svg>
                </span>`;
            }

            function spawn(){
                // bias toward hearts: fewer flowers
                const isFlower = Math.random() < 0.15; // 15% flowers, 85% hearts
                // make flowers smaller than hearts
                const size = isFlower ? Math.floor(8 + Math.random() * 10) : Math.floor(10 + Math.random() * 14);
                const left = Math.floor(Math.random() * 90) + 5; // 5%..95%
                let html = isFlower ? createFlowerHTML(size) : createHeartHTML(size);
                html = html.replace('VAR_LEFT', left);
                const wrapper = document.createElement('div');
                wrapper.innerHTML = html;
                const el = wrapper.firstElementChild;
                floating.appendChild(el);

                // compute fall distance so item reaches bottom of the container
                const rect = container.getBoundingClientRect();
                const distance = Math.max(180, rect.height + 60);
                el.style.setProperty('--fall-distance', distance + 'px');

                // duration loosely proportional to distance
                const dur = Math.max(3, (distance/140) + Math.random()*1.6).toFixed(2);
                const delay = (Math.random() * 0.9).toFixed(2);

                el.style.left = left + '%';
                el.style.top = (-20 - Math.random()*30) + 'px';
                el.style.opacity = '1';
                el.style.animation = `fall ${dur}s linear ${delay}s forwards`;

                // slight rotation
                el.style.transform = `translateY(0) rotate(${(Math.random()*30-15).toFixed(2)}deg)`;

                el.addEventListener('animationend', () => { el.remove(); });
                // safety remove after dur+delay+1s
                setTimeout(()=> el.remove(), (parseFloat(dur)+parseFloat(delay)+1)*1000);
            }

            // spawn initially a few (quick warmup)
            for(let i=0;i<10;i++){ setTimeout(spawn, i*150); }
            // continuous spawn (more frequent to increase flowing hearts)
            const interval = setInterval(spawn, 350);
            // stop spawning when user navigates away
            window.addEventListener('beforeunload', ()=> clearInterval(interval));
        })();

        // Background side spawner: extra hearts streaming down left and right edges
        (function(){
            const bgFloating = document.createElement('div');
            bgFloating.className = 'bg-floating-container';
            document.body.appendChild(bgFloating);

            function createSideHeart(size){
                const span = document.createElement('span');
                span.className = 'floating-item';
                span.style.width = size + 'px';
                span.style.height = size + 'px';
                span.innerHTML = `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" aria-hidden="true"><path d="M16 29s-13-8.5-13-16c0-4.5 3.5-7 7-7 2.5 0 4 1.2 6 3 2-1.8 3.5-3 6-3 3.5 0 7 2.5 7 7 0 7.5-13 16-13 16z" fill="#ff2540"/></svg>`;
                return span;
            }

            function spawnSide(){
                const side = Math.random() < 0.5 ? 'left' : 'right';
                const size = Math.floor(8 + Math.random() * 12);
                const el = createSideHeart(size);
                bgFloating.appendChild(el);

                // choose x near edge
                let leftPct;
                if(side === 'left') leftPct = 1 + Math.random()*6; // 1%..7%
                else leftPct = 93 + Math.random()*6; // 93%..99%

                // fall distance relative to viewport
                const distance = Math.max(220, window.innerHeight + 80);
                el.style.setProperty('--fall-distance', distance + 'px');

                // position and animation
                el.style.left = leftPct + '%';
                el.style.top = (-10 - Math.random()*40) + 'px';
                const dur = (4 + Math.random()*6).toFixed(2);
                const delay = (Math.random()*0.6).toFixed(2);
                el.style.animation = `fall ${dur}s linear ${delay}s forwards`;
                el.style.transform = `translateY(0) rotate(${(Math.random()*40-20).toFixed(2)}deg)`;

                el.addEventListener('animationend', () => { el.remove(); });
                setTimeout(()=> el.remove(), (parseFloat(dur)+parseFloat(delay)+1)*1000);
            }

            // more frequent bursts on sides
            const sideInterval = setInterval(spawnSide, 220);
            // stop when unload
            window.addEventListener('beforeunload', ()=> clearInterval(sideInterval));
        })();
    </script>
